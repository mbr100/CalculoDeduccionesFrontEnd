<div class="economico-shell">
    <!-- Sidebar -->
    <app-sidebar [idEconomico]="this.economicoId" ></app-sidebar>

    <!-- Contenido principal -->
    <div class="economico-main">
        <!-- Navegación de pestañas -->
        <div class="flex space-x-1 bg-gray-100 p-1 rounded-lg mb-6 w-full">
            @for (tab of tabs; track tab.id) {
                <button (click)="setActiveTab(tab.id)" [class]="getTabButtonClass(tab.id)">
                    <i [class]="tab.icon" class="mr-2"></i>
                    <span>{{ tab.label }}</span>
                </button>
            }
        </div>

        <!-- Contenido de las pestañas -->
        <div class="bg-gray-50 rounded-lg p-6 flex-1 min-h-0 w-full overflow-auto">

            <!-- PESTAÑA PERSONAL -->
            @if (activeTab() === 'personal') {
                <app-listado-personal [idEconomico]="this.economicoId"></app-listado-personal>
            }

            <!-- PESTAÑA PROYECTOS -->
            @if (activeTab() === 'retribuciones') {
                <app-retribuciones-personal [idEconomico]="this.economicoId"></app-retribuciones-personal>
            }

            <!-- PESTAÑA CONFIGURACIÓN -->
            @if (activeTab() === 'rnts') {
                <app-bases-cotizacion-personal [idEconomico]="this.economicoId"></app-bases-cotizacion-personal>
            }

            <!-- PESTAÑA BAJAS -->
            @if (activeTab() === 'bajas') {
                <app-bajas-personal [idEconomico]="this.economicoId" [anualidad]="this.anualidad()"></app-bajas-personal>
            }

            <!-- PESTAÑA PERÍODOS CONTRATO -->
            @if (activeTab() === 'periodos') {
                <app-periodos-contrato-personal [idEconomico]="this.economicoId" [anualidad]="this.anualidad()"></app-periodos-contrato-personal>
            }

            <!-- PESTAÑA BONIFICACIONES -->
            @if (activeTab() === 'bonificaciones') {
                <app-bonificaciones-personal [idEconomico]="this.economicoId" [anualidad]="this.anualidad()"></app-bonificaciones-personal>
            }

            <!-- PESTAÑA RESUMEN -->
            @if (activeTab() === 'resumen') {
                <app-resumen-coste-hora-personal [idEconomico]="this.economicoId"></app-resumen-coste-hora-personal>
            }
        </div>
    </div>
</div>
