<div class="w-16 h-screen bg-white shadow-lg border-r border-gray-200 flex-shrink-0">
    <div class="p-2 flex flex-col h-full">
        <!-- Navegación del sidebar -->
        <nav class="space-y-2 flex-1">
            <!-- Botón Economico -->
            <button (click)="goToEconomico()" title="Economico" [class]="getButtonClass('economico')">
                <i class="fas fa-coins text-blue-500"></i>
            </button>

            <!-- Botón Personal -->
            <button (click)="goToPersonal()" title="Personal" [class]="getButtonClass('personal')">
                <i class="fas fa-users text-lg text-blue-500"></i>
            </button>

            <!-- Botón Proyectos -->
            <button (click)="goToProyectos()" title="Proyectos" [class]="getButtonClass('proyectos')">
                <i class="fas fa-project-diagram text-blue-500"></i>
            </button>

            <!-- Botón Asignaciones -->
            <button (click)="goToAsignaciones()" title="Asignaciones" [class]="getButtonClass('asignaciones')">
                <i class="fas fa-tasks text-blue-500"></i>
            </button>
            <!-- Botón Resumen -->
            <button (click)="goToResumen()" title="Resumen" [class]="getButtonClass('resumen')">
                <i class="fas fa-chart-bar text-blue-500"></i>
            </button>
        </nav>
    </div>
</div>
